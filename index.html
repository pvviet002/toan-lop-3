<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mục Lục - Toán Lớp 3 Tập 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fdfdfd;
        }

        /* Hiệu ứng Text cho Tiêu đề MỤC LỤC giống SGK */
        .title-mucluc {
            font-size: 3rem;
            font-weight: 900;
            color: #9275b6;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 4px  4px 6px rgba(0,0,0,0.15);
        }

        @media (min-width: 768px) {
            .title-mucluc {
                font-size: 4rem;
            }
        }

        /* Định dạng Bảng */
        .toc-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .toc-table th, .toc-table td {
            border-left: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
        }
        
        .toc-table th:first-child, .toc-table td:first-child { border-left: none; }
        .toc-table th:last-child, .toc-table td:last-child { border-right: none; }

        /* Header Tím đậm */
        .toc-header {
            background-color: #8c6eb0;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Dòng Chủ đề Tím nhạt */
        .toc-topic {
            background-color: #bcaadb;
            font-weight: 700;
            color: #334155;
        }

        /* Dòng xen kẽ */
        .toc-row-even { background-color: #f6f3f9; }
        .toc-row-odd { background-color: #ffffff; }

        .hover-link {
            transition: color 0.2s ease-in-out;
        }
        .hover-link:hover {
            color: #7e22ce;
            text-decoration: underline;
        }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <div class="max-w-5xl mx-auto w-full flex-grow flex flex-col">
        
        <!-- Header -->
        <div class="mb-8 text-center mt-6">
            <h1 class="title-mucluc mb-6">Mục Lục</h1>
        </div>

        <!-- Bảng Mục Lục -->
        <div class="w-full bg-white rounded-xl mb-12">
            <table class="toc-table">
                <thead>
                    <tr class="toc-header">
                        <th class="py-3 px-2 w-[10%] text-center">Chủ đề</th>
                        <th class="py-3 px-6 w-[80%] text-center">Nội dung</th>
                        <th class="py-3 px-2 w-[10%] text-center">Trang</th>
                    </tr>
                </thead>
                <tbody id="toc-body" class="text-slate-700 text-[15px] md:text-base">
                    <!-- Nội dung sẽ được render bằng JS -->
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // Dữ liệu mục lục bám sát chính xác 100% hình ảnh SGK
        const tocData = [
            { type: 'header', topic: '1', title: 'ÔN TẬP VÀ BỔ SUNG', page: '6' },
            { type: 'lesson', num: 1, title: 'Bài 1. Ôn tập các số đến 1 000', page: '6' },
            { type: 'lesson', num: 2, title: 'Bài 2. Ôn tập phép cộng, phép trừ trong phạm vi 1 000', page: '9' },
            { type: 'lesson', num: 3, title: 'Bài 3. Tìm thành phần trong phép cộng, phép trừ', page: '11' },
            { type: 'lesson', num: 4, title: 'Bài 4. Ôn tập bảng nhân 2; 5, bảng chia 2; 5', page: '14' },
            { type: 'lesson', num: 5, title: 'Bài 5. Bảng nhân 3, bảng chia 3', page: '16' },
            { type: 'lesson', num: 6, title: 'Bài 6. Bảng nhân 4, bảng chia 4', page: '19' },
            { type: 'lesson', num: 7, title: 'Bài 7. Ôn tập hình học và đo lường', page: '21' },
            { type: 'lesson', num: 8, title: 'Bài 8. Luyện tập chung', page: '24' },
            
            { type: 'header', topic: '2', title: 'BẢNG NHÂN, BẢNG CHIA', page: '28' },
            { type: 'lesson', num: 9, title: 'Bài 9. Bảng nhân 6, bảng chia 6', page: '28' },
            { type: 'lesson', num: 10, title: 'Bài 10. Bảng nhân 7, bảng chia 7', page: '31' },
            { type: 'lesson', num: 11, title: 'Bài 11. Bảng nhân 8, bảng chia 8', page: '33' },
            { type: 'lesson', num: 12, title: 'Bài 12. Bảng nhân 9, bảng chia 9', page: '36' },
            { type: 'lesson', num: 13, title: 'Bài 13. Tìm thành phần trong phép nhân, phép chia', page: '39' },
            { type: 'lesson', num: 14, title: 'Bài 14. Một phần mấy', page: '42' },
            { type: 'lesson', num: 15, title: 'Bài 15. Luyện tập chung', page: '46' },

            { type: 'header', topic: '3', title: 'LÀM QUEN VỚI HÌNH PHẲNG, HÌNH KHỐI', page: '49' },
            { type: 'lesson', num: 16, title: 'Bài 16. Điểm ở giữa, trung điểm của đoạn thẳng', page: '49' },
            { type: 'lesson', num: 17, title: 'Bài 17. Hình tròn. Tâm, bán kính, đường kính của hình tròn', page: '52' },
            { type: 'lesson', num: 18, title: 'Bài 18. Góc, góc vuông, góc không vuông', page: '54' },
            { type: 'lesson', num: 19, title: 'Bài 19. Hình tam giác, hình tứ giác. Hình chữ nhật, hình vuông', page: '56' },
            { type: 'lesson', num: 20, title: 'Bài 20. Thực hành vẽ góc vuông, vẽ đường tròn, hình vuông, hình chữ nhật và vẽ trang trí', page: '61' },
            { type: 'lesson', num: 21, title: 'Bài 21. Khối lập phương, khối hộp chữ nhật', page: '63' },
            { type: 'lesson', num: 22, title: 'Bài 22. Luyện tập chung', page: '65' },

            { type: 'header', topic: '4', title: 'PHÉP NHÂN, PHÉP CHIA TRONG PHẠM VI 100', page: '67' },
            { type: 'lesson', num: 23, title: 'Bài 23. Nhân số có hai chữ số với số có một chữ số', page: '67' },
            { type: 'lesson', num: 24, title: 'Bài 24. Gấp một số lên một số lần', page: '70' },
            { type: 'lesson', num: 25, title: 'Bài 25. Phép chia hết, phép chia có dư', page: '72' },
            { type: 'lesson', num: 26, title: 'Bài 26. Chia số có hai chữ số cho số có một chữ số', page: '75' },
            { type: 'lesson', num: 27, title: 'Bài 27. Giảm một số đi một số lần', page: '79' },
            { type: 'lesson', num: 28, title: 'Bài 28. Bài toán giải bằng hai bước tính', page: '81' },
            { type: 'lesson', num: 29, title: 'Bài 29. Luyện tập chung', page: '83' },

            { type: 'header', topic: '5', title: 'MỘT SỐ ĐƠN VỊ ĐO ĐỘ DÀI, KHỐI LƯỢNG, DUNG TÍCH, NHIỆT ĐỘ', page: '85' },
            { type: 'lesson', num: 30, title: 'Bài 30. Mi-li-mét', page: '85' },
            { type: 'lesson', num: 31, title: 'Bài 31. Gam', page: '87' },
            { type: 'lesson', num: 32, title: 'Bài 32. Mi-li-lít', page: '89' },
            { type: 'lesson', num: 33, title: 'Bài 33. Nhiệt độ. Đơn vị đo nhiệt độ', page: '91' },
            { type: 'lesson', num: 34, title: 'Bài 34. Thực hành và trải nghiệm với các đơn vị mi-li-mét, gam, mi-li-lít, độ C', page: '93' },
            { type: 'lesson', num: 35, title: 'Bài 35. Luyện tập chung', page: '95' },

            { type: 'header', topic: '6', title: 'PHÉP NHÂN, PHÉP CHIA TRONG PHẠM VI 1 000', page: '97' },
            { type: 'lesson', num: 36, title: 'Bài 36. Nhân số có ba chữ số với số có một chữ số', page: '97' },
            { type: 'lesson', num: 37, title: 'Bài 37. Chia số có ba chữ số cho số có một chữ số', page: '99' },
            { type: 'lesson', num: 38, title: 'Bài 38. Biểu thức số. Tính giá trị của biểu thức số', page: '104' },
            { type: 'lesson', num: 39, title: 'Bài 39. So sánh số lớn gấp mấy lần số bé', page: '109' },
            { type: 'lesson', num: 40, title: 'Bài 40. Luyện tập chung', page: '111' },

            { type: 'header', topic: '7', title: 'ÔN TẬP HỌC KÌ 1', page: '113' },
            { type: 'lesson', num: 41, title: 'Bài 41. Ôn tập phép nhân, phép chia trong phạm vi 100, 1 000', page: '113' },
            { type: 'lesson', num: 42, title: 'Bài 42. Ôn tập biểu thức số', page: '116' },
            { type: 'lesson', num: 43, title: 'Bài 43. Ôn tập hình học và đo lường', page: '118' },
            { type: 'lesson', num: 44, title: 'Bài 44. Ôn tập chung', page: '120' },

            { type: 'extra', title: 'Một số thuật ngữ dùng trong sách', page: '122' }
        ];

        function renderTable() {
            const tbody = document.getElementById('toc-body');
            let html = '';
            
            // Theo dõi dòng chẵn/lẻ để tô màu nền
            let rowColorFlag = false; // false = odd (trắng), true = even (tím nhạt)

            tocData.forEach(item => {
                if (item.type === 'header') {
                    // Dòng Chủ Đề
                    html += `
                        <tr class="toc-topic">
                            <td class="py-2.5 px-2 text-center text-xl">${item.topic}</td>
                            <td class="py-2.5 px-6 uppercase tracking-wide">${item.title}</td>
                            <td class="py-2.5 px-2 text-center text-lg">${item.page}</td>
                        </tr>
                    `;
                    // Reset cờ xen kẽ màu sau mỗi dòng chủ đề
                    rowColorFlag = false; 
                } 
                else if (item.type === 'lesson') {
                    // Dòng Bài Học
                    let rowClass = rowColorFlag ? 'toc-row-even' : 'toc-row-odd';
                    html += `
                        <tr class="${rowClass}">
                            <td class="py-2.5 px-2 text-center"></td>
                            <td class="py-2.5 px-6 pl-8">
                                <a href="bai-${item.num}.html" class="hover-link block w-full h-full">${item.title}</a>
                            </td>
                            <td class="py-2.5 px-2 text-center font-medium">${item.page}</td>
                        </tr>
                    `;
                    rowColorFlag = !rowColorFlag; // Đảo cờ
                }
                else if (item.type === 'extra') {
                    // Dòng thông tin bổ sung (Phụ lục)
                    let rowClass = rowColorFlag ? 'toc-row-even' : 'toc-row-odd';
                    html += `
                        <tr class="${rowClass}">
                            <td class="py-2.5 px-2 text-center"></td>
                            <td class="py-2.5 px-6 pl-8 italic">
                                <a href="#" class="hover-link block w-full h-full">${item.title}</a>
                            </td>
                            <td class="py-2.5 px-2 text-center font-medium">${item.page}</td>
                        </tr>
                    `;
                    rowColorFlag = !rowColorFlag;
                }
            });

            tbody.innerHTML = html;
        }

        // Chạy hàm render khi tải trang
        renderTable();
    </script>
</body>
</html>
