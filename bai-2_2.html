    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fdfbf7; /* warm cream */
        }
        
        .no-select { user-select: none; -webkit-user-select: none; }
        .btn-press:active:not(:disabled) { transform: scale(0.95); }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; opacity: 0; transform: scale(0.5); }
        @keyframes bounceIn { 
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; } 
        }

        /* Giao diện Bảng Phấn */
        .chalkboard {
            background-color: #064e3b; /* emerald-900 */
            background-image: radial-gradient(#022c22 1px, transparent 1px);
            background-size: 20px 20px;
            border: 16px solid #92400e; /* amber-800 - Khung gỗ */
            border-radius: 12px;
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,0.6), 
                inset 0 0 10px rgba(0,0,0,0.3),
                0 15px 25px rgba(0,0,0,0.2);
            color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
        }

        .chalkboard::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .chalk-text {
            color: #f8fafc;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }

        .pulse-btn {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
    </style>
</head>
