<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Con Vui Học - Săn Chữ</title>

    <!-- Import React, ReactDOM, và Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Import Google Font dễ thương cho Con -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Nunito', sans-serif;
            /* Nền họa tiết chấm bi giống cuốn vở */
            background-color: #fdfbfb;
            background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .font-kid {
            font-family: 'Nunito', sans-serif;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
        
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }

        @keyframes popCircle {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .animate-bounce-slow { animation: bounce-slow 2s infinite; }

        /* Hiệu ứng vẽ nét bút đỏ khoanh chữ (viền hơi méo tự nhiên) */
        .circled {
            position: relative;
            color: #ef4444 !important; /* Đổi màu chữ thành đỏ khi được khoanh */
            font-weight: 900;
        }
        
        .circled::after {
            content: '';
            position: absolute;
            top: -10px; left: -15px; right: -15px; bottom: -10px;
            border: 5px solid #ef4444; /* Bút lông đỏ */
            /* Tạo hình dạng méo nhẹ để giống nét bút khoanh bằng tay */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            animation: popCircle 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
            z-index: -1;
        }

        /* Style chữ mục tiêu viền vàng nổi bật */
        .text-target-outline {
            color: #ef4444;
            -webkit-text-stroke: 4px #fde047;
            text-shadow: 0px 6px 12px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ==========================================
        // CÁC COMPONENT ICON
        // ==========================================
        const IconPlay = ({ size=24, className="", fill="none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const IconVolume2 = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        );
        const IconStar = ({ size=24, className="", fill="none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        );
        const IconRefresh = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
        );
        const IconHome = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        );
        const IconArrowLeft = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        );

        // ==========================================
        // DỮ LIỆU BẢNG CHỮ CÁI
        // ==========================================
        const ALPHABET = [
            { lower: 'a', upper: 'A', name: 'chữ a' }, { lower: 'ă', upper: 'Ă', name: 'chữ á' }, { lower: 'â', upper: 'Â', name: 'chữ ớ' },
            { lower: 'b', upper: 'B', name: 'chữ bờ' }, { lower: 'c', upper: 'C', name: 'chữ cờ' }, { lower: 'd', upper: 'D', name: 'chữ dờ' },
            { lower: 'đ', upper: 'Đ', name: 'chữ đờ' }, { lower: 'e', upper: 'E', name: 'chữ e' }, { lower: 'ê', upper: 'Ê', name: 'chữ ê' },
            { lower: 'g', upper: 'G', name: 'chữ gờ' }, { lower: 'h', upper: 'H', name: 'chữ hờ' }, { lower: 'i', upper: 'I', name: 'chữ i ngắn' },
            { lower: 'k', upper: 'K', name: 'chữ ca' }, { lower: 'l', upper: 'L', name: 'chữ lờ' }, { lower: 'm', upper: 'M', name: 'chữ mờ' },
            { lower: 'n', upper: 'N', name: 'chữ nờ' }, { lower: 'o', upper: 'O', name: 'chữ o' }, { lower: 'ô', upper: 'Ô', name: 'chữ ô' },
            { lower: 'ơ', upper: 'Ơ', name: 'chữ ơ' }, { lower: 'p', upper: 'P', name: 'chữ pờ' }, { lower: 'q', upper: 'Q', name: 'chữ cu' },
            { lower: 'r', upper: 'R', name: 'chữ rờ' }, { lower: 's', upper: 'S', name: 'chữ sờ' }, { lower: 't', upper: 'T', name: 'chữ tờ' },
            { lower: 'u', upper: 'U', name: 'chữ u' }, { lower: 'ư', upper: 'Ư', name: 'chữ ư' }, { lower: 'v', upper: 'V', name: 'chữ vờ' },
            { lower: 'x', upper: 'X', name: 'chữ xờ' }, { lower: 'y', upper: 'Y', name: 'chữ y dài' }
        ];

        // ==========================================
        // COMPONENT CHÍNH
        // ==========================================
        const App = () => {
            const [gameState, setGameState] = useState('START'); // START, PLAYING, END
            const [targetLetter, setTargetLetter] = useState(null);
            const [boardLetters, setBoardLetters] = useState([]);
            const [foundCount, setFoundCount] = useState(0);
            const [totalTargets, setTotalTargets] = useState(0);
            const [wrongClickedId, setWrongClickedId] = useState(null);
            const [starCount, setStarCount] = useState(0);

            const activeTimeoutsRef = useRef([]);
            const recentTargetsRef = useRef([]);

            useEffect(() => {
                return () => {
                    activeTimeoutsRef.current.forEach(clearTimeout);
                    window.speechSynthesis.cancel();
                };
            }, []);

            const setSafeTimeout = (callback, delay) => {
                const timer = setTimeout(callback, delay);
                activeTimeoutsRef.current.push(timer);
                return timer;
            };

            const speak = useCallback((text, rate = 0.9, onEndCallback = null) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    
                    const bestVoice = voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && (v.name.includes('Neural') || v.name.includes('HoaiMy')))
                                   || voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && v.name.includes('Google'))
                                   || voices.find(v => v.lang.includes('vi') || v.lang.includes('VN'));
                                   
                    if (bestVoice) utterance.voice = bestVoice;
                    
                    utterance.lang = 'vi-VN';
                    utterance.rate = rate; 
                    utterance.pitch = 1.1; 

                    if (onEndCallback) {
                        let isEnded = false;
                        const handleEnd = () => {
                            if (!isEnded) {
                                isEnded = true;
                                onEndCallback();
                            }
                        };
                        utterance.onend = handleEnd;
                        utterance.onerror = handleEnd;
                        setSafeTimeout(handleEnd, text.length * 120 + 1000); 
                    }
                    window.speechSynthesis.speak(utterance);
                } else {
                    if (onEndCallback) setSafeTimeout(onEndCallback, 1500);
                }
            }, []);

            const generateBoard = useCallback(() => {
                let availableTargets = ALPHABET.filter(item => !recentTargetsRef.current.includes(item.lower));
                if (availableTargets.length === 0) {
                    recentTargetsRef.current = [];
                    availableTargets = ALPHABET;
                }
                const target = availableTargets[Math.floor(Math.random() * availableTargets.length)];
                recentTargetsRef.current.push(target.lower);

                setTargetLetter(target);

                // GIẢM SỐ LƯỢNG CHỮ ĐỂ Con ĐỠ RỐI
                const BOARD_SIZE = 7; // Tổng 7 chữ
                const TARGET_AMOUNT = 2; // Cần tìm 2 chữ (1 hoa, 1 thường hoặc ngẫu nhiên)
                setTotalTargets(TARGET_AMOUNT);
                setFoundCount(0);

                let newBoard = [];
                
                // Thêm các chữ mục tiêu
                for (let i = 0; i < TARGET_AMOUNT; i++) {
                    newBoard.push({
                        id: `target_${i}`,
                        char: i % 2 === 0 ? target.upper : target.lower,
                        isTarget: true,
                        isFound: false,
                        rot: Math.floor(Math.random() * 20) - 10, // Độ nghiêng nhỏ
                        tx: Math.floor(Math.random() * 10) - 5,
                        ty: Math.floor(Math.random() * 10) - 5
                    });
                }

                // Thêm các chữ nhiễu
                const distractors = ALPHABET.filter(item => item.lower !== target.lower);
                for (let i = 0; i < (BOARD_SIZE - TARGET_AMOUNT); i++) {
                    const randomDistractor = distractors[Math.floor(Math.random() * distractors.length)];
                    newBoard.push({
                        id: `distractor_${i}`,
                        char: Math.random() > 0.5 ? randomDistractor.upper : randomDistractor.lower,
                        isTarget: false,
                        isFound: false,
                        rot: Math.floor(Math.random() * 20) - 10,
                        tx: Math.floor(Math.random() * 10) - 5,
                        ty: Math.floor(Math.random() * 10) - 5
                    });
                }

                // Trộn đều
                newBoard.sort(() => Math.random() - 0.5);
                setBoardLetters(newBoard);

                setSafeTimeout(() => {
                    speak(`Con tìm ${target.name} nhé!`);
                }, 300);

            }, [speak]);

            const handleStartApp = () => {
                const applause = document.getElementById('applauseSound');
                if (applause) {
                    applause.play().then(() => {
                        applause.pause();
                        applause.currentTime = 0;
                    }).catch(e => console.log("Lỗi mồi audio:", e));
                }
                setStarCount(0);
                recentTargetsRef.current = [];
                speak(`Cùng chơi Săn chữ nhé!`, 0.9, () => {
                    setGameState('PLAYING');
                    generateBoard();
                });
            };

            const handleLetterClick = (letterObj) => {
                if (letterObj.isFound) return; 

                if (letterObj.isTarget) {
                    setBoardLetters(prev => prev.map(l => l.id === letterObj.id ? { ...l, isFound: true } : l));
                    
                    const newFoundCount = foundCount + 1;
                    setFoundCount(newFoundCount);

                    const ping = document.getElementById('pingSound');
                    if (ping) {
                        ping.currentTime = 0;
                        ping.play().catch(e=>console.log(e));
                    }

                    if (newFoundCount >= totalTargets) {
                        const applause = document.getElementById('applauseSound');
                        if (applause) {
                            applause.currentTime = 0;
                            applause.play().catch(e => console.log(e));
                        }

                        setStarCount(s => s + 1);
                        speak(`Hoan hô!`, 0.9, () => {
                            setSafeTimeout(() => {
                                if (starCount + 1 >= ALPHABET.length) {
                                    setGameState('END');
                                    speak("Con giỏi quá! Con đã tìm được toàn bộ bảng chữ cái rồi!");
                                } else {
                                    generateBoard();
                                }
                            }, 800);
                        });
                    }

                } else {
                    setWrongClickedId(letterObj.id);
                    speak(`Chưa đúng rồi.`);
                    setSafeTimeout(() => setWrongClickedId(null), 800);
                }
            };

            const repeatQuestion = () => {
                speak(`Con tìm ${targetLetter.name} nhé!`);
            };

            // ========================================
            // GIAO DIỆN START
            // ========================================
            if (gameState === 'START') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 font-sans relative">
                        <audio id="applauseSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1067517c5b.mp3" preload="auto"></audio>
                        <audio id="pingSound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3" preload="auto"></audio>

                        <button onClick={() => window.location.href='index.html'} className="absolute top-6 left-6 flex items-center gap-2 bg-white text-indigo-500 border-2 border-indigo-100 hover:bg-indigo-50 px-4 py-2 rounded-xl shadow-sm font-bold transition-transform active:scale-90 z-20">
                            <IconArrowLeft size={24} /> Về Menu
                        </button>
                        
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl text-center max-w-md w-full border-4 border-slate-100 transform transition hover:scale-105 z-10 relative">
                            <div className="text-7xl mb-6 relative animate-bounce-slow">
                                🐝<span className="absolute -top-2 -right-4 text-4xl">🔍</span>
                            </div>
                            <h1 className="text-5xl font-black mb-2 font-kid text-sky-500 tracking-wider">
                                SĂN CHỮ
                            </h1>
                            <p className="text-lg text-slate-500 mb-8 font-semibold">Con tinh mắt tìm chữ cái nha!</p>
                            <button 
                                onClick={handleStartApp}
                                className="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-800 text-3xl font-black py-5 px-8 rounded-3xl shadow-[0_8px_0_#ca8a04] active:translate-y-2 active:shadow-none flex items-center justify-center gap-4 transition-all"
                            >
                                <IconPlay size={36} fill="currentColor" /> Bắt đầu ngay
                            </button>
                        </div>
                    </div>
                );
            }

            // ========================================
            // GIAO DIỆN END
            // ========================================
            if (gameState === 'END') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 font-sans">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl text-center max-w-md w-full border-4 border-slate-100 relative">
                            <div className="text-[100px] mb-4 animate-bounce-slow">🏆</div>
                            <h1 className="text-4xl font-black text-rose-500 mb-6">Con Giỏi Quá!</h1>
                            
                            <div className="flex justify-center gap-2 mb-4 bg-slate-50 py-5 rounded-[2rem] border-2 border-slate-100">
                                {[1, 2, 3, 4, 5].map(i => (
                                    <IconStar key={i} size={48} className="text-yellow-400 drop-shadow-md" fill="currentColor" />
                                ))}
                            </div>
                            
                            <p className="text-xl text-sky-600 font-bold mb-8">
                                Con đã hoàn thành {ALPHABET.length}/{ALPHABET.length} chữ cái!
                            </p>
                            
                            <div className="flex flex-col gap-4">
                                <button onClick={handleStartApp} className="w-full bg-sky-400 hover:bg-sky-500 text-white text-2xl font-black py-5 rounded-2xl shadow-[0_6px_0_#0284c7] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2">
                                    <IconRefresh size={28} /> Chơi lại bài này
                                </button>
                                <button onClick={() => window.location.href='index.html'} className="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 text-2xl font-bold py-5 rounded-2xl shadow-[0_6px_0_#94a3b8] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2 mt-2">
                                    <IconHome size={28} /> Về màn hình chính
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ========================================
            // GIAO DIỆN PLAYING
            // ========================================
            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-6 font-sans relative overflow-hidden">
                    
                    {/* Header Controls */}
                    <div className="w-full max-w-4xl flex justify-between items-center bg-white p-3 md:p-4 rounded-3xl shadow-sm border-2 border-slate-100 z-20">
                        <button onClick={() => window.location.href='index.html'} className="text-slate-400 hover:text-rose-500 bg-slate-50 p-3 rounded-full active:scale-90 transition">
                            <IconArrowLeft size={28} />
                        </button>
                        
                        <div className="flex gap-1 md:gap-2 flex-1 items-center justify-center bg-sky-50 py-2 px-6 rounded-full w-fit mx-auto border-2 border-sky-100">
                            {[...Array(5)].map((_, i) => {
                                const activeStars = starCount === 0 ? 0 : ((starCount - 1) % 5) + 1;
                                return <IconStar key={i} size={28} className={i < activeStars ? "text-yellow-400 transform scale-110 drop-shadow-sm" : "text-slate-200"} fill={i < activeStars ? "currentColor" : "none"} />
                            })}
                            <div className="ml-2 font-black text-sky-500 text-xl border-l-2 border-sky-200 pl-3">
                                {starCount}/{ALPHABET.length}
                            </div>
                        </div>
                        
                        <button onClick={repeatQuestion} className="bg-green-100 hover:bg-green-200 text-green-600 p-3 rounded-full active:scale-90 transition shadow-sm border border-green-200">
                            <IconVolume2 size={28} />
                        </button>
                    </div>

                    {/* Vùng trò chơi Worksheet */}
                    <div className="flex-1 w-full max-w-3xl flex flex-col items-center mt-6 md:mt-8 z-10 relative">
                        
                        {/* HÌNH TRANG TRÍ MÉP VỞ */}
                        <div className="absolute -top-10 -left-6 md:-left-10 text-7xl md:text-[90px] animate-bounce-slow z-30 pointer-events-none hidden sm:block">🐝</div>
                        <div className="absolute -bottom-10 -right-8 md:-right-12 text-[120px] md:text-[160px] z-30 pointer-events-none hidden sm:block">🐻</div>
                        <div className="absolute bottom-16 -left-6 md:-left-10 text-6xl md:text-[80px] z-30 pointer-events-none hidden sm:block">🍯</div>

                        {/* TỜ BÀI TẬP TRẮNG */}
                        <div className="w-full bg-white rounded-[2.5rem] shadow-xl border-4 border-slate-100 p-6 md:p-10 flex flex-col items-center z-10">
                            
                            {/* Tiêu đề & Mục tiêu: Căn chỉnh lại cho iPad */}
                            <div className="w-full flex flex-col md:flex-row justify-between items-center text-center md:text-left px-2 mb-8 md:mb-12 border-b-4 border-slate-50 pb-6 gap-6">
                                <div className="flex flex-col">
                                    <h2 className="text-4xl md:text-5xl font-black text-sky-500 tracking-wider">SĂN CHỮ</h2>
                                    <p className="text-lg md:text-xl text-slate-500 font-semibold mt-1">Con tìm và chọn chữ cái</p>
                                </div>
                                
                                {targetLetter && (
                                    <div className="flex gap-4 md:gap-8 items-end text-target-outline font-black bg-yellow-50 px-6 py-2 md:px-8 md:py-3 rounded-[2rem] border-4 border-yellow-200 shadow-sm">
                                        <span className="text-[75px] md:text-[110px] leading-none transform -rotate-3">{targetLetter.upper}</span>
                                        <span className="text-[60px] md:text-[85px] leading-none transform rotate-3">{targetLetter.lower}</span>
                                    </div>
                                )}
                            </div>

                            {/* Lưới chữ cái rải rác */}
                            <div className="grid grid-cols-3 sm:grid-cols-4 gap-y-10 gap-x-4 md:gap-x-8 w-full max-w-2xl mx-auto">
                                {boardLetters.map((letterObj) => {
                                    const isWrong = wrongClickedId === letterObj.id;
                                    
                                    return (
                                        <div key={letterObj.id} className="flex justify-center items-center h-[80px] w-[80px] sm:h-[100px] sm:w-[100px] md:h-[130px] md:w-[130px] mx-auto">
                                            <button
                                                onClick={() => handleLetterClick(letterObj)}
                                                style={{
                                                    transform: `rotate(${letterObj.rot}deg) translate(${letterObj.tx}px, ${letterObj.ty}px)`
                                                }}
                                                className={`
                                                    w-full h-full flex items-center justify-center font-kid font-bold bg-transparent transition-all duration-300 outline-none
                                                    ${isWrong ? 'animate-shake text-slate-300' : 'hover:scale-110 active:scale-95'}
                                                    ${letterObj.isFound ? 'circled rotate-0 translate-x-0 translate-y-0 text-red-500' : 'text-slate-800'}
                                                `}
                                            >
                                                <span className="text-[60px] sm:text-[75px] md:text-[95px] leading-none pointer-events-none">
                                                    {letterObj.char}
                                                </span>
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* Hiệu ứng qua bài */}
                    {foundCount >= totalTargets && totalTargets > 0 && (
                        <div className="absolute inset-0 pointer-events-none flex items-center justify-center z-50 bg-white/40 backdrop-blur-sm">
                             <div className="text-[120px] animate-bounce drop-shadow-2xl">🌟</div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
